name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  # !!! 改為你的 Docker Hub 帳號
  DOCKERHUB_USERNAME: ${{ secrets.jiachanggit }}

jobs:
  # ───────────────────────────────────────────────────────
  # JOB 1: 跑測試
  # ───────────────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: prediction-service/requirements.txt

      - name: Install dependencies
        run: |
          cd prediction-service
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run unit tests
        run: |
          cd prediction-service
          python -m pytest tests/ -v --tb=short

  # ───────────────────────────────────────────────────────
  # JOB 2: 建立並推送 Docker images（只在 main branch）
  # ───────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Images
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        include:
          - service: prediction
            context: ./prediction-service
            image: k8s-smart-scaler-prediction
          - service: controller
            context: ./scaler-controller
            image: k8s-smart-scaler-controller
          - service: demo
            context: ./demo-app
            image: k8s-smart-scaler-demo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.jiachanggit }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.jiachanggit }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=true

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────────────
  # JOB 3: 部署到 K8s
  # ───────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to K8s
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Configure kubeconfig
        # !!! 需要在 GitHub Secrets 加入 KUBE_CONFIG（base64 編碼的 kubeconfig）
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Set image tag in manifests
        run: |
          SHA_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          DOCKUSER="${{ env.jiachanggit }}"

          # 替換 deployment.yaml 中的 image tag
          sed -i "s|YOUR_DOCKERHUB_USERNAME|${DOCKUSER}|g" \
            k8s/prediction-service/deployment.yaml \
            k8s/scaler-controller/deployment.yaml \
            k8s/demo-app/deployment.yaml

          sed -i "s|:latest|:${SHA_TAG}|g" \
            k8s/prediction-service/deployment.yaml \
            k8s/scaler-controller/deployment.yaml \
            k8s/demo-app/deployment.yaml

      - name: Apply K8s manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/rbac/
          kubectl apply -f k8s/prediction-service/
          kubectl apply -f k8s/scaler-controller/
          kubectl apply -f k8s/demo-app/

      - name: Wait for deployments
        run: |
          kubectl rollout status deployment/demo-app \
            -n demo --timeout=120s

          kubectl rollout status deployment/prediction-service \
            -n smart-scaler --timeout=180s

          kubectl rollout status deployment/scaler-controller \
            -n smart-scaler --timeout=60s

      - name: Deployment summary
        run: |
          echo "=== Deployment Status ==="
          kubectl get pods -n smart-scaler
          kubectl get pods -n demo
          echo "=== Services ==="
          kubectl get svc -n smart-scaler
          kubectl get svc -n demo
