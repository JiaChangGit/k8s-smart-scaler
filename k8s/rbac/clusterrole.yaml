apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: smart-scaler-role
rules:
  # 讀寫 Deployment（用於縮放）
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # 讀取 Pod 資訊（選用）
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]
