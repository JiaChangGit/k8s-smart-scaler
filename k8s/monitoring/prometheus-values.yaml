# Helm values for kube-prometheus-stack
# 安裝指令: helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
#   --namespace monitoring -f k8s/monitoring/prometheus-values.yaml

grafana:
  adminPassword: admin123
  service:
    type: ClusterIP

prometheus:
  prometheusSpec:
    # 允許 scrape 所有 namespace 的 ServiceMonitor
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    # 資料保留 7 天
    retention: 7d
    # 允許抓取有 prometheus.io/scrape: "true" annotation 的 pod
    additionalScrapeConfigs:
      - job_name: "pod-annotation-scrape"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
